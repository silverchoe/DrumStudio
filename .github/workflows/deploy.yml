name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SheetViewer/DrumStudio/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: SheetViewer/DrumStudio

      - name: Build
        run: npm run build
        working-directory: SheetViewer/DrumStudio
        env:
          PUBLIC_URL: /DrumStudio

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: SheetViewer/DrumStudio/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
